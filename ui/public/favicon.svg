<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="phi-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="120" height="120" rx="24" fill="#0f0a1a"/>
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="42" stroke="url(#phi-gradient)" stroke-width="3" fill="none"/>
  <!-- Phi symbol: ellipse + vertical bar -->
  <ellipse cx="60" cy="60" rx="22" ry="28" stroke="#c4b5fd" stroke-width="4.5" fill="none"/>
  <line x1="60" y1="12" x2="60" y2="108" stroke="#c4b5fd" stroke-width="4.5" stroke-linecap="round"/>
</svg>
